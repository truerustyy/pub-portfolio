<!DOCTYPE html>
<html class="staticrypt-html">
<head>
    <meta charset="utf-8" />
    <title>Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0a0f1c;
            color: #f3f5f8;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .staticrypt-html { height: 100%; }
        .staticrypt-body { height: 100%; }

        .staticrypt-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .staticrypt-page { width: 100%; max-width: 380px; }

        /* Brand */
        .sc-brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .sc-brand-name {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f3f5f8 0%, #4d91ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sc-brand-sub {
            font-size: 0.72rem;
            color: #adc1db;
            margin-top: 0.25rem;
            letter-spacing: 0.05em;
        }

        /* Card */
        .staticrypt-form {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2rem;
        }

        .staticrypt-instructions {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .staticrypt-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #f3f5f8;
            margin-bottom: 0.4rem;
        }
        .staticrypt-instructions p:last-child {
            font-size: 0.83rem;
            color: #adc1db;
            line-height: 1.5;
        }

        .staticrypt-hr {
            border: 0;
            border-top: 1px solid #334155;
            margin: 0 0 1.25rem;
        }

        /* Input */
        .staticrypt-password-container {
            position: relative;
            background: #263348;
            border: 1px solid #334155;
            border-radius: 6px;
            margin-bottom: 0.85rem;
            transition: border-color 180ms ease;
        }
        .staticrypt-password-container:focus-within {
            border-color: #416eff;
            box-shadow: 0 0 0 3px rgba(65,110,255,0.12);
        }

        .staticrypt-form input[type="password"],
        .staticrypt-form input[type="text"] {
            background: transparent;
            border: 0;
            outline: 0;
            width: 100%;
            padding: 0.75rem 2.75rem 0.75rem 0.9rem;
            font-size: 0.9rem;
            color: #f3f5f8;
            font-family: 'Consolas', 'Monaco', monospace;
            letter-spacing: 0.04em;
        }
        .staticrypt-form input::placeholder {
            color: #adc1db;
            opacity: 0.6;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            letter-spacing: normal;
        }

        .staticrypt-toggle-password-visibility {
            cursor: pointer;
            height: 18px;
            width: 18px;
            opacity: 0.45;
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            filter: invert(1);
            transition: opacity 180ms ease;
        }
        .staticrypt-toggle-password-visibility:hover { opacity: 0.8; }

        /* Button */
        .staticrypt-decrypt-button {
            width: 100%;
            padding: 0.72rem;
            background: #416eff;
            color: #fff;
            border: 0;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: filter 180ms ease;
        }
        .staticrypt-decrypt-button:hover  { filter: brightness(115%); }
        .staticrypt-decrypt-button:active { filter: brightness(88%); }

        /* Remember */
        label.staticrypt-remember {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.85rem;
            font-size: 0.82rem;
            color: #adc1db;
            cursor: pointer;
        }
        .staticrypt-remember input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: #416eff;
            flex-shrink: 0;
        }

        /* Footer */
        .sc-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #334155;
        }

        /* Utilities */
        .hidden { display: none !important; }

        /* Spinner */
        .staticrypt-spinner-container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .staticrypt-spinner {
            width: 2rem;
            height: 2rem;
            border: 3px solid #334155;
            border-right-color: #416eff;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
